
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unser Wochenendtrip ❤️</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
text-align:center;
min-height:100vh;
padding:20px;
}

.container{
max-width:800px;
margin:0 auto;
padding:30px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

.hidden{display:none;}

.slide-container{
position:relative;
height:500px;
overflow:hidden;
margin:20px 0;
}

.slide{
position:absolute;
inset:0;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
gap:10px;
}

.slide.active{
display:flex;
}

.slide-img{
max-height:90%;
max-width:98%;
object-fit:contain;
border-radius:15px;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

.slide-text{
background:rgba(0,0,0,0.7);
padding:15px 25px;
border-radius:20px;
font-size:1.1rem;
max-width:90%;
margin:0;
}

/* MEMORY */

.memory-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
max-width:500px;
margin:20px auto;
}

.memory-card{
aspect-ratio:3/4;
cursor:pointer;
position:relative;
height:120px;
transition:transform 0.6s ease;
transform-style:preserve-3d;
}

.memory-card.flipped{
transform:rotateY(180deg);
}

.memory-card.matched{
opacity:0.3;
cursor:default;
}

.card-face{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
display:flex;
align-items:center;
justify-content:center;
border-radius:12px;
font-size:2rem;
}

.card-back{
background:linear-gradient(135deg,#ff6b6b,#4ecdc4);
}

.card-front{
background:white;
transform:rotateY(180deg);
}

.gift-img{
max-width:100%;
border-radius:20px;
margin:20px 0;
}

</style>
</head>

<body>

<div class="container">

<div id="start">
<h1>🎉 Eine kleine Überraschung ❤️</h1>
<p>Dieses Wochenende wartet ein kleines Abenteuer auf uns.</p>
<button onclick="showTrip()">Zeig mir mehr →</button>
</div>

<div id="trip" class="hidden">

<h1>Unser Wochenendtrip ❤️</h1>
<p>Nur wir zwei. Ein Wochenende voller Erinnerungen.</p>

<div class="slide-container" id="gallery"></div>

<button id="giftButton" onclick="startGame()" class="hidden">
Geschenk öffnen! 🎁
</button>

</div>

<div id="game" class="hidden">

<h1>🧠 Memory – Nur Rückseiten!</h1>

<div class="memory-grid" id="memoryGrid"></div>

<p id="progressText">Paare gefunden: 0 / 6</p>

<p id="gameStatus"></p>

</div>

</div>

<script>

/* SLIDESHOW */

const slides = [
{img:'Bild1.jpeg',text:'Tag 1: Unsere Anreise – das Abenteuer beginnt ❤️'},
{img:'Bild2.jpeg',text:'Der erste Sonnenuntergang zusammen'},
{img:'bild3.jpg',text:'Unser Lieblingsmoment am See'}
];

let currentSlide=0;

function showTrip(){

document.getElementById("start").classList.add("hidden");
document.getElementById("trip").classList.remove("hidden");

initGallery();

}

function initGallery(){

const container=document.getElementById("gallery");

slides.forEach((slide,index)=>{

const div=document.createElement("div");

div.className="slide active";

div.innerHTML=`
<img class="slide-img" src="${slide.img}">
<div class="slide-text">${slide.text}</div>
`;

container.appendChild(div);

});

document.getElementById("giftButton").classList.remove("hidden");

}

/* MEMORY */

let flippedCards=[];
let matchedPairs=0;

function startGame(){

document.getElementById("trip").classList.add("hidden");
document.getElementById("game").classList.remove("hidden");

initMemoryGame();

}

function initMemoryGame(){

const symbols=['❤️','❤️','🌹','🌹','💋','💋','💍','💍','🌅','🌅','🍦','🍦'];
symbols.sort(()=>Math.random()-0.5);

const grid=document.getElementById("memoryGrid");

grid.innerHTML='';
matchedPairs=0;

symbols.forEach(symbol=>{

const card=document.createElement("div");

card.className="memory-card";
card.dataset.symbol=symbol;

card.innerHTML=`
<div class="card-face card-back">?</div>
<div class="card-face card-front">${symbol}</div>
`;

card.addEventListener("click",flipCard);

grid.appendChild(card);

});

}

function flipCard(){

if(this.classList.contains("flipped")) return;

this.classList.add("flipped");

flippedCards.push(this);

if(flippedCards.length===2){

if(flippedCards[0].dataset.symbol===flippedCards[1].dataset.symbol){

matchedPairs++;
flippedCards=[];

document.getElementById("progressText").textContent =
`Paare gefunden: ${matchedPairs} / 6`;

if(matchedPairs===6){

document.getElementById("gameStatus").innerHTML=
`🎉 Alle Paare gefunden!<br><img src="Bild1.jpeg" class="gift-img">`;

}

}else{

setTimeout(()=>{
flippedCards.forEach(c=>c.classList.remove("flipped"));
flippedCards=[];
},1000);

}

}

}

</script>

</body>
</html
