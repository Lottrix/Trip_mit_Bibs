```html
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unser Wochenendtrip ❤️</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
text-align:center;
min-height:100vh;
padding:20px;
}

.container{
max-width:800px;
margin:0 auto;
padding:30px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

h1{
font-size:clamp(1.6rem,4.5vw,2.2rem);
margin-bottom:20px;
}

p{
font-size:1.2rem;
line-height:1.6;
margin-bottom:20px;
}

button{
padding:15px 30px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
background:white;
color:#764ba2;
margin:20px;
font-weight:600;
transition:all 0.3s;
box-shadow:0 8px 20px rgba(255,255,255,0.3);
}

button:hover{
transform:translateY(-2px);
box-shadow:0 12px 25px rgba(255,255,255,0.4);
}

.hidden{
display:none;
}

/* Slideshow */

.slide-container{
position:relative;
height:650px;
overflow:hidden;
margin:20px 0;
}

.slide{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
opacity:0;
transition:opacity 1.5s ease;
}

.slide.active{
opacity:1;
}

/* Film Zoom Effekt */

@keyframes slowZoom{
0%{transform:scale(1);}
100%{transform:scale(1.08);}
}

.slide-img{
width:100%;
height:80%;
object-fit:contain;
border-radius:15px;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
animation:slowZoom 10s linear;
}

/* Text direkt am Bild */

.slide-text{
background:rgba(0,0,0,0.6);
padding:12px 20px;
border-radius:18px;
font-size:1.1rem;
max-width:90%;
margin-top:-10px;
}

.dots{
display:flex;
justify-content:center;
gap:10px;
margin:20px 0;
}

.dot{
width:14px;
height:14px;
border-radius:50%;
background:#fff;
opacity:0.6;
cursor:pointer;
transition:all 0.3s;
}

.dot.active{
opacity:1;
background:#764ba2;
transform:scale(1.2);
}

/* Memory Game */

.game-container{
margin:30px 0;
position:relative;
}

.memory-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
max-width:500px;
margin:20px auto;
}

.memory-card{
aspect-ratio:3/4;
cursor:pointer;
position:relative;
height:120px;
transition:transform 0.6s ease;
transform-style:preserve-3d;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

.memory-card.flipped{
transform:rotateY(180deg);
}

.memory-card.matched{
opacity:0.3;
cursor:default;
background:rgba(0,0,0,0.7) !important;
}

.card-face{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
display:flex;
align-items:center;
justify-content:center;
border-radius:12px;
font-size:2rem;
font-weight:bold;
}

.card-back{
background:linear-gradient(135deg,#ff6b6b,#4ecdc4);
}

.card-front{
background:rgba(255,255,255,0.95);
transform:rotateY(180deg);
}

.game-text{
font-size:1.3rem;
margin:20px;
}

.progress{
font-size:1.2rem;
margin-top:10px;
}

.sentence-progress{
font-size:1.4rem;
font-weight:bold;
margin:20px 0;
min-height:40px;
background:rgba(255,255,255,0.2);
padding:15px;
border-radius:15px;
}

.final-animation{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:10;
display:flex;
align-items:center;
justify-content:center;
}

@keyframes popInGlow{
0%{transform:scale(0);opacity:0;}
60%{transform:scale(1.3);}
100%{transform:scale(1);}
}

.pop-animation{
animation:popInGlow 1.5s ease-out;
font-size:clamp(3rem,10vw,6rem);
font-weight:900;
color:#ffd700;
}

.gift-img{
max-width:100%;
height:auto;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.5);
margin:20px 0;
}

/* Mobile */

@media (max-width:480px){

.slide-container{
height:460px;
}

.slide-img{
height:75%;
}

.memory-grid{
grid-template-columns:repeat(4,70px);
gap:10px;
}

.memory-card{
height:95px;
}

}

</style>
</head>

<body>

<div class="container">

<div id="start">
<h1>🎉 Eine kleine Überraschung ❤️</h1>
<p>Dieses Wochenende wartet ein kleines Abenteuer auf uns.</p>
<button onclick="showTrip()">Zeig mir mehr →</button>
</div>

<div id="trip" class="hidden">

<h1>Unser Wochenendtrip ❤️</h1>
<p>Nur wir zwei. Ein Wochenende voller Erinnerungen.</p>

<div class="slide-container" id="gallery"></div>
<div class="dots" id="dots"></div>

<button id="giftButton" onclick="startGame()" class="hidden" style="margin-top:30px;">
Geschenk öffnen! 🎁
</button>

</div>

</div>

<script>

const slides=[
{img:'Bild1.jpeg',text:'Tag 1: Unsere Anreise – das Abenteuer beginnt ❤️'},
{img:'Bild2.jpeg',text:'Der erste Sonnenuntergang zusammen'},
{img:'bild3.jpg',text:'Unser Lieblingsmoment am See'},
{img:'bild4.jpg',text:'Spaziergang Hand in Hand'},
{img:'Bild5.jpeg',text:'Das leckerste Eis ever! 🍦'},
{img:'Bild6.jpeg',text:'Abendstimmung zu zweit'},
{img:'Bild7.jpeg',text:'Unser Geheimtipp-Aussichtspunkt'},
{img:'Bild8.jpeg',text:'Lachen bis der Bauch weh tut'},
{img:'Bild9.jpeg',text:'Der Moment, der alles perfekt machte'},
{img:'Bild10.jpeg',text:'Bis bald – nächstes Abenteuer wartet! 💕'}
];

let currentSlide=0;
let slideInterval;

function showTrip(){
document.getElementById('start').classList.add('hidden');
document.getElementById('trip').classList.remove('hidden');
initGallery();
slideInterval=setInterval(nextSlide,10000);
}

function initGallery(){

const container=document.getElementById('gallery');
const dots=document.getElementById('dots');

container.innerHTML='';
dots.innerHTML='';

slides.forEach((slide,index)=>{

const slideDiv=document.createElement('div');
slideDiv.className='slide'+(index===0?' active':'');

slideDiv.innerHTML=`
<img class="slide-img" src="${slide.img}">
<div class="slide-text">${slide.text}</div>
`;

container.appendChild(slideDiv);

const dot=document.createElement('span');
dot.classList.add('dot');
if(index===0)dot.classList.add('active');
dot.onclick=()=>goToSlide(index);
dots.appendChild(dot);

});

}

function updateSlides(){

const slideDivs=document.querySelectorAll('.slide');
const dotElems=document.querySelectorAll('.dot');

slideDivs.forEach((s,i)=>s.classList.toggle('active',i===currentSlide));
dotElems.forEach((d,i)=>d.classList.toggle('active',i===currentSlide));

if(currentSlide===slides.length-1){
setTimeout(()=>{
document.getElementById('giftButton').classList.remove('hidden');
},500);
}

}

function nextSlide(){
currentSlide=(currentSlide+1)%slides.length;
updateSlides();
}

function goToSlide(index){
currentSlide=index;
updateSlides();
}

</script>

</body>
</html>
```
